name: build-macos-internal

on:
  workflow_dispatch:

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_body: ${{ steps.meta.outputs.release_body }}
    steps:
      - name: Build release metadata
        id: meta
        run: |
          created_at="$(date -u +"%Y-%m-%d %H:%M UTC")"
          short_sha="${GITHUB_SHA::7}"
          release_tag="internal-macos-run-${GITHUB_RUN_NUMBER}"
          release_name="Abandon macOS Internal Build #${GITHUB_RUN_NUMBER}"
          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "release_body<<EOF"
            echo "Automated internal macOS build."
            echo ""
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Commit: ${short_sha}"
            echo "- Created: ${created_at}"
            echo ""
            echo "Included assets:"
            echo "- macOS Apple Silicon (.dmg / .app.tar.gz / signatures)"
            echo "- macOS Intel (.dmg / .app.tar.gz / signatures)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or reuse prerelease
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          RELEASE_BODY: ${{ steps.meta.outputs.release_body }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const name = process.env.RELEASE_NAME;
            const body = process.env.RELEASE_BODY;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.info(`Release ${tag} already exists, will reuse it.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                target_commitish: context.sha,
                name,
                body,
                prerelease: true
              });
            }

  build-macos-internal:
    needs: prepare-release
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact_name: abandon-macos-internal-aarch64
          - target: x86_64-apple-darwin
            artifact_name: abandon-macos-internal-x64
    env:
      CI: "true"
      APPLE_SIGNING_IDENTITY: "-"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build internal macOS bundles
        run: npm run tauri build -- --target ${{ matrix.target }} --bundles app,dmg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          shopt -s nullglob
          files=(
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig
          )

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No macOS bundle files found for release upload."
            exit 1
          fi

          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
