name: build-ios

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Initialize iOS project
        run: npm exec tauri ios init

      - name: Build iOS IPA
        run: npm exec tauri ios build -- --export-method ad-hoc

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: abandon-ios-ipa
          if-no-files-found: error
          path: |
            src-tauri/gen/apple/build/**/*.ipa

      - name: Upload tagged release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/apple/build/**/*.ipa
